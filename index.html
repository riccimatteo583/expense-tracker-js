<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Personal Expense Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Expense Tracker</h1>
      <p class="subtitle">Track your expenses — simple, private, and fast.</p>
    </header>

    <main>
      <section class="card form-card">
        <form id="expense-form">
          <div class="form-row">
            <div class="field">
              <label for="description">Description</label>
              <input id="description" name="description" type="text" required maxlength="100" />
            </div>
            <div class="field">
              <label for="amount">Amount</label>
              <input id="amount" name="amount" type="number" step="0.01" min="0" required />
            </div>
          </div>

          <div class="form-row">
            <div class="field">
              <label for="category">Category</label>
              <select id="category" name="category" required>
                <option value="">Select category</option>
                <option>Groceries</option>
                <option>Transport</option>
                <option>Utilities</option>
                <option>Entertainment</option>
                <option>Health</option>
                <option>Other</option>
              </select>
            </div>
            <div class="field">
              <label for="date">Date</label>
              <input id="date" name="date" type="date" required />
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" id="submit-btn" class="btn primary">Add Expense</button>
            <button type="button" id="reset-btn" class="btn">Reset</button>
          </div>
        </form>
      </section>

      <section class="card control-card">
        <div class="controls">
          <div class="filter">
            <label for="filter-category">Filter</label>
            <select id="filter-category">
              <option value="all">All Categories</option>
            </select>
          </div>
          <div class="total">
            <span>Total</span>
            <strong id="total-amount">$0.00</strong>
          </div>
        </div>
      </section>

      <section class="card list-card">
        <ul id="expenses-list" class="expenses-list"></ul>
      </section>
    </main>

    <footer>
      <small>Stored locally in your browser · No account required</small>
    </footer>
  </div>

  <script type="module" src="js/app.js" defer></script>
</body>
</html>
